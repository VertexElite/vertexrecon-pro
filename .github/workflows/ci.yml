name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go (vertex-net)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Init module & vet
        working-directory: go
        run: |
          [ -f go.mod ] || go mod init vertex-net
          gofmt -l . | tee /tmp/fmt.out
          test ! -s /tmp/fmt.out || (echo "gofmt found unformatted files" && exit 1)
          go vet ./...
      - name: Build
        working-directory: go
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /tmp/vertex-net vertex-net.go

  rust:
    name: Rust (vertex-sys)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Format check
        working-directory: rust
        run: cargo fmt --check || echo "::warning::cargo fmt reported differences"
      - name: Build (release)
        working-directory: rust
        run: cargo build --release
      - name: Clippy
        working-directory: rust
        run: cargo clippy --release || echo "::warning::clippy reported lints"

  ruby:
    name: Ruby (vertex-osint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Syntax check
        run: ruby -c ruby/vertex-osint.rb

  ocaml:
    name: OCaml (vertex-pattern)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OCaml
        run: sudo apt-get update && sudo apt-get install -y ocaml ocaml-findlib
      - name: Compile
        run: ocamlfind ocamlopt -package str -linkpkg -o /tmp/vertex-pattern ocaml/vertex_pattern.ml
